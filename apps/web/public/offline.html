<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Hors ligne - ASAP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    
    .offline-container {
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }
    
    .offline-icon svg {
      width: 60px;
      height: 60px;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #ffffff;
      line-height: 1.2;
    }
    
    p {
      font-size: 16px;
      color: #a3a3a3;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    button:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.secondary {
      background: #27272a;
      color: #ffffff;
    }
    
    button.secondary:hover {
      background: #3f3f46;
    }
    
    .status {
      margin-top: 40px;
      padding: 16px;
      background: #18181b;
      border-radius: 10px;
      border: 1px solid #27272a;
    }
    
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #a3a3a3;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 2s ease-in-out infinite;
    }
    
    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }
    
    .status-dot.online {
      background: #22c55e;
      animation: none;
    }
    
    .cached-pages {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #27272a;
    }
    
    .cached-pages h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ffffff;
    }
    
    .page-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .page-link {
      display: block;
      padding: 12px 16px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #6366f1;
      text-decoration: none;
      transition: all 0.2s ease;
      font-size: 14px;
    }
    
    .page-link:hover {
      background: #27272a;
      transform: translateX(4px);
    }
    
    @media (max-width: 640px) {
      h1 {
        font-size: 24px;
      }
      
      .offline-icon {
        width: 100px;
        height: 100px;
        margin-bottom: 24px;
      }
      
      .offline-icon svg {
        width: 50px;
        height: 50px;
      }
      
      button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24">
        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"></path>
        <path d="M5 13l2 2c3.09-3.09 8.91-3.09 12 0l2-2c-4.07-4.07-10.93-4.07-15 0z"></path>
        <path d="M9 17l3 3 3-3a4.24 4.24 0 0 0-6 0z"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </div>
    
    <h1>📡 Vous êtes hors ligne</h1>
    <p>Impossible de charger cette page pour le moment. Vérifiez votre connexion Internet et réessayez.</p>
    
    <div class="actions">
      <button id="retry-btn" onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Réessayer
      </button>
      <button class="secondary" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Retour
      </button>
    </div>
    
    <div class="status">
      <div class="status-indicator">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Hors ligne</span>
      </div>
    </div>
    
    <div class="cached-pages" id="cached-pages" style="display: none;">
      <h2>Pages disponibles hors ligne</h2>
      <div class="page-list" id="page-list"></div>
    </div>
  </div>
  
  <script>
    // Monitor online/offline status
    function updateStatus() {
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      
      if (navigator.onLine) {
        statusDot.classList.add('online');
        statusText.textContent = 'De retour en ligne';
        
        // Auto-reload after 2 seconds when back online
        setTimeout(() => {
          location.reload();
        }, 2000);
      } else {
        statusDot.classList.remove('online');
        statusText.textContent = 'Hors ligne';
      }
    }
    
    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    
    // Initial status check
    updateStatus();
    
    // Check for cached pages
    if ('caches' in window) {
      // Find the dynamic cache (version-agnostic)
      caches.keys().then(cacheNames => {
        const dynamicCache = cacheNames.find(name => name.includes('asap-dynamic'));
        if (!dynamicCache) return;
        
        caches.open(dynamicCache).then(cache => {
          cache.keys().then(requests => {
            if (requests.length > 0) {
              const cachedPages = document.getElementById('cached-pages');
              const pageList = document.getElementById('page-list');
              
              cachedPages.style.display = 'block';
            
            const commonPages = [
              { url: '/dashboard', title: 'Tableau de bord' },
              { url: '/extensions', title: 'Extensions' },
              { url: '/cloud', title: 'Cloud' },
              { url: '/notifications', title: 'Notifications' },
              { url: '/settings', title: 'Paramètres' },
            ];
            
            commonPages.forEach(page => {
              const link = document.createElement('a');
              link.href = page.url;
              link.className = 'page-link';
              link.textContent = page.title;
              pageList.appendChild(link);
            });
          }
        });
      });
    });
    }
    
    // Retry with loading indicator
    const retryBtn = document.getElementById('retry-btn');
    retryBtn.addEventListener('click', (e) => {
      e.preventDefault();
      retryBtn.disabled = true;
      retryBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Connexion...';
      
      setTimeout(() => {
        location.reload();
      }, 500);
    });
  </script>
  
  <style>
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</body>
</html>
