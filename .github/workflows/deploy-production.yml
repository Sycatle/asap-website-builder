name: Deploy production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to current ref)"
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  resolve-sha:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - id: resolve
        run: |
          SHA="${{ inputs.sha || github.sha }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying $SHA"

  build-and-push:
    needs: resolve-sha
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: api
            dockerfile: infra/Dockerfile.api
          - service: worker
            dockerfile: infra/Dockerfile.worker
          - service: web
            dockerfile: infra/Dockerfile.web
          - service: sites
            dockerfile: infra/Dockerfile.sites
          - service: accounts
            dockerfile: infra/Dockerfile.accounts
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ needs.resolve-sha.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ needs.resolve-sha.outputs.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  deploy:
    needs: [resolve-sha, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Set image tags to SHA
        working-directory: infra/kubernetes/overlays/production
        run: |
          SHA="${{ needs.resolve-sha.outputs.sha }}"
          for svc in api worker web sites accounts; do
            kustomize edit set image "asap-$svc=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:$SHA"
          done
          cat kustomization.yaml

      - name: Guard against mutable tags
        run: |
          if grep -E 'newTag:\s*(latest|staging|0\.0\.0-PLACEHOLDER)\b' infra/kubernetes/overlays/production/kustomization.yaml; then
            echo "::error::Production overlay still references a mutable or placeholder tag"
            exit 1
          fi

      - name: Render manifests
        run: kustomize build infra/kubernetes/overlays/production > rendered.yaml

      - uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply manifests
        run: kubectl apply -f rendered.yaml --record

      - name: Wait for rollout
        run: |
          for d in asap-api asap-worker asap-web asap-sites asap-accounts; do
            kubectl rollout status deployment/$d -n asap --timeout=5m
          done
