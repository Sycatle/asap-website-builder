name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (correctness/suspicious are hard failures)
        # Correctness and suspicious lints catch real bugs and pass today,
        # so they're enforced. Style/pedantic warnings are still emitted but
        # not blocking — promote them once the existing diff is cleaned up.
        run: cargo clippy --workspace --all-targets -- -D clippy::correctness -D clippy::suspicious

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  sqlx-check:
    name: sqlx offline cache freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
      - name: Verify .sqlx is up to date
        env:
          SQLX_OFFLINE: "true"
        run: cargo sqlx prepare --workspace --check -- --all-targets

  node:
    name: Node (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (astro check + build)
        run: pnpm -r --if-present build

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Test
        run: pnpm -r --if-present test -- --run

  section-codegen-smoke:
    name: Section codegen HTTP smoke test
    runs-on: ubuntu-latest
    needs: [rust, sqlx-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build API binary
        run: cargo build -p asap-api --release
      - name: Bring up postgres + redis + run migrations
        run: |
          docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.dev.yml \
            up -d postgres redis
          docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.dev.yml \
            up --exit-code-from migrations migrations
      - name: Run API locally against the compose Postgres
        env:
          DATABASE_URL: postgresql://asap:asap_dev_password@127.0.0.1:5432/asap
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: "ci-only-test-secret-please-do-not-use-in-production-32+chars"
          ASAP_ENV: development
          CORS_ALLOWED_ORIGINS: http://localhost:4321,http://localhost:4322
          ASAP_API_PORT: "3000"
          RUST_LOG: warn
        run: |
          ./target/release/asap-api &
          echo $! > /tmp/api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/auth/csrf-token > /dev/null 2>&1; then
              echo "api ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:3000/api/auth/csrf-token > /dev/null
      - name: Section codegen end-to-end
        env:
          API_URL: http://localhost:3000/api
        run: bash scripts/test-section-codegen.sh
      - name: Tear down
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then kill "$(cat /tmp/api.pid)" || true; fi
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml down -v

  manifests:
    name: K8s manifests guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbid mutable tags in production overlay
        run: |
          set -euo pipefail
          file=infra/kubernetes/overlays/production/kustomization.yaml
          if grep -E 'newTag:[[:space:]]*(latest|staging)\b' "$file"; then
            echo "::error file=$file::Production overlay must not reference mutable image tags"
            exit 1
          fi
          if grep -E 'image:[[:space:]]*[^[:space:]]+:latest' infra/kubernetes/overlays/production/*.yaml 2>/dev/null; then
            echo "::error::Production overlay must not pin :latest images"
            exit 1
          fi
