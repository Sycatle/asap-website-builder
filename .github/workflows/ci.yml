name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        # Not enforced yet: large existing diff. Run locally before tightening.
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo clippy
        # Not enforced yet: many pre-existing warnings. Promote to -D warnings once cleaned.
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  sqlx-check:
    name: sqlx offline cache freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
      - name: Verify .sqlx is up to date
        env:
          SQLX_OFFLINE: "true"
        run: cargo sqlx prepare --workspace --check -- --all-targets

  node:
    name: Node (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (astro check + build)
        run: pnpm -r --if-present build

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Test
        run: pnpm -r --if-present test -- --run
