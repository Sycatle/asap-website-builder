# nginx config for ASAP web (static SPA)
# Serves Vite build output with SPA fallback + security headers.

server {
    listen 4321;
    listen [::]:4321;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml;

    # Security headers (CSP is broad to match prior Astro middleware; tighten
    # connect-src once PUBLIC_API_URL is known at deploy time).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Long cache for hashed assets (Vite emits content-hashed filenames)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Service worker must not be cached (allow updates)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        expires 0;
    }

    # SPA fallback: everything that isn't a file → index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself must not be cached so deploys propagate
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Health probe target
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
