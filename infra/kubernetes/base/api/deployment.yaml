apiVersion: v1
kind: Service
metadata:
  name: asap-api
  namespace: asap
  labels:
    app: asap-api
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: asap-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asap-api
  namespace: asap
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asap-api
  template:
    metadata:
      labels:
        app: asap-api
    spec:
      initContainers:
        # Wait for PostgreSQL to be ready
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h asap-postgres -p 5432 -U asap; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: asap-secrets
                  key: postgres-password
      containers:
        - name: api
          image: asap-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: asap-config
          env:
            - name: DATABASE_URL
              value: "postgresql://asap:$(POSTGRES_PASSWORD)@asap-postgres:5432/asap"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asap-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: asap-secrets
                  key: jwt-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: asap-config
                  key: PUBLIC_APP_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
