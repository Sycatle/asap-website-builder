# Template — copy this file, fill it in, and apply with `kubectl apply -f` (or, preferably,
# manage via sealed-secrets / external-secrets so it never lives in plaintext on disk).
#
# Required keys:
#   bucket            : S3 bucket name (no scheme, no path)
#   region            : AWS region (e.g. eu-west-3)
#   endpoint          : Optional, for R2/MinIO/Backblaze (e.g. https://<account>.r2.cloudflarestorage.com)
#   access-key-id     : IAM/programmatic access key with PutObject on the bucket
#   secret-access-key : Matching secret
#   gpg-recipient     : Key id / email of the public key used to encrypt dumps
#   gpg-public-key    : The ASCII-armored public key block
#
# Generate the GPG keypair on a workstation that is NOT a CI runner:
#   gpg --batch --gen-key gpg.conf  # see docs/self-hosting/backup-restore.md
#   gpg --armor --export "$GPG_RECIPIENT" > public.asc
#   gpg --armor --export-secret-keys "$GPG_RECIPIENT" > private.asc   # keep this offline!

apiVersion: v1
kind: Secret
metadata:
  name: asap-backup
  namespace: asap
type: Opaque
stringData:
  bucket: "asap-backups-prod"
  region: "eu-west-3"
  endpoint: ""
  access-key-id: "REPLACE_ME"
  secret-access-key: "REPLACE_ME"
  gpg-recipient: "backups@asap.cool"
  gpg-public-key: |
    -----BEGIN PGP PUBLIC KEY BLOCK-----
    REPLACE_ME
    -----END PGP PUBLIC KEY BLOCK-----
