apiVersion: v1
kind: Service
metadata:
  name: asap-postgres
  namespace: asap
  labels:
    app: asap-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: asap-postgres
  clusterIP: None  # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: asap-postgres
  namespace: asap
spec:
  serviceName: asap-postgres
  replicas: 1
  selector:
    matchLabels:
      app: asap-postgres
  template:
    metadata:
      labels:
        app: asap-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "asap"
            - name: POSTGRES_DB
              value: "asap"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asap-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - asap
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - asap
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
