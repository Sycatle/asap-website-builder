apiVersion: v1
kind: Service
metadata:
  name: asap-redis
  namespace: asap
  labels:
    app: asap-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: asap-redis
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: asap-redis
  namespace: asap
spec:
  serviceName: asap-redis
  replicas: 1
  selector:
    matchLabels:
      app: asap-redis
  template:
    metadata:
      labels:
        app: asap-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
