apiVersion: v1
kind: Service
metadata:
  name: asap-web
  namespace: asap
  labels:
    app: asap-web
spec:
  ports:
    - port: 4321
      targetPort: 4321
  selector:
    app: asap-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asap-web
  namespace: asap
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asap-web
  template:
    metadata:
      labels:
        app: asap-web
    spec:
      containers:
        - name: web
          image: asap-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4321
          # nginx static SPA — PUBLIC_API_URL is baked at build time
          # (Vite inlines import.meta.env.PUBLIC_* into the bundle), so
          # runtime env vars are no longer needed here.
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4321
            initialDelaySeconds: 15
            periodSeconds: 30
