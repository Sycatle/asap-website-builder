# ============================================================================
# ASAP v2 - Production Docker Compose
# Optimized for performance, security, and reliability
# ============================================================================

services:
  # ==========================================================================
  # Infrastructure Services
  # ==========================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: asap-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-asap}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asap-network
    # Production: don't expose port externally, only internal network access
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: asap-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asap-network

  # ==========================================================================
  # Database Migrations (runs once on startup)
  # ==========================================================================
  
  migrations:
    image: postgres:15-alpine
    container_name: asap-migrations-prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asap}
      MIGRATIONS_DIR: /migrations
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
      - ../scripts/run-migrations.sh:/run-migrations.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash coreutils xxd && bash /run-migrations.sh"]
    restart: "no"
    networks:
      - asap-network

  # ==========================================================================
  # Application Services
  # ==========================================================================

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
      args:
        - SQLX_OFFLINE=true
    image: asap-api:${VERSION:-latest}
    container_name: asap-api-prod
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asap}
      REDIS_URL: redis://redis:6379
      RUST_LOG: asap_api=info,asap_core_api=info,tower_http=info,sqlx=warn
      ASAP_API_PORT: 3000
      ASAP_API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4321}
      # Production settings
      RUST_BACKTRACE: 0
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - asap-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
      args:
        - SQLX_OFFLINE=true
    image: asap-worker:${VERSION:-latest}
    container_name: asap-worker-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asap}
      RUST_LOG: asap_worker=info,sqlx=warn
      POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL:-30}
      RUST_BACKTRACE: 0
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - asap-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    image: asap-web:${VERSION:-latest}
    container_name: asap-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4321}:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000/api}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - asap-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  sites:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sites
    image: asap-sites:${VERSION:-latest}
    container_name: asap-sites-prod
    restart: unless-stopped
    ports:
      - "${SITES_PORT:-4322}:4322"
    environment:
      HOST: 0.0.0.0
      PORT: 4322
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000/api}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4322/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - asap-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ==========================================================================
# Networks & Volumes
# ==========================================================================

networks:
  asap-network:
    name: asap-prod-network
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
