# Development override configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Web application in dev mode with hot reload
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
    volumes:
      - ../apps/web:/app
      - /app/node_modules

  # API in dev mode - mount locally compiled binary
  api:
    volumes:
      - ../target/debug/asap-api:/usr/local/bin/asap-api
    environment:
      RUST_LOG: asap_api=debug,asap_core_api=debug,tower_http=info,sqlx=warn

  # Worker in dev mode (optional)
  # worker:
  #   volumes:
  #     - ../apps/worker:/app/apps/worker
  #     - ../core:/app/core
  #     - ../modules:/app/modules
