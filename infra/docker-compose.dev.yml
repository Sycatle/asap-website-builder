# Development configuration - Full Docker environment
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # API in dev mode - build inside container with hot reload
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api.dev
    container_name: asap-api
    volumes:
      # Mount source code for hot reload
      - ../core:/app/core
      - ../apps/api:/app/apps/api
      - ../modules:/app/modules
      - ../.sqlx:/app/.sqlx
      # Cache cargo registry and target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - api-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      REDIS_URL: redis://redis:6379
      RUST_LOG: asap_api=debug,asap_core_api=debug,tower_http=info,sqlx=warn
      ASAP_API_PORT: 3000
      ASAP_API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_12345}
      CORS_ALLOWED_ORIGINS: http://localhost:4321,http://web:4321
      # SQLX_OFFLINE disabled to use live DB verification in dev
    ports:
      - "3000:3000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    # Disable healthcheck in dev mode (cargo-watch takes time to compile)
    healthcheck:
      disable: true
    networks:
      - asap-network

  # Worker in dev mode - build inside container
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker.dev
    container_name: asap-worker
    command: ["cargo", "watch", "-x", "run --bin asap-worker", "-w", "apps/worker", "-w", "core", "-w", "modules"]
    volumes:
      # Mount source code for hot reload
      - ../core:/app/core
      - ../apps/worker:/app/apps/worker
      - ../modules:/app/modules
      - ../.sqlx:/app/.sqlx
      # Cache cargo registry and target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - worker-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: asap_worker=debug,sqlx=warn
      POLL_INTERVAL_SECONDS: 5
      # SQLX_OFFLINE disabled to use live DB verification in dev
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - asap-network

  # Web application in dev mode with hot reload
  web:
    image: node:20-alpine
    container_name: asap-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: development
    volumes:
      - ../apps/web:/app
      - ../packages:/packages
      - web-node-modules:/app/node_modules
    depends_on:
      - api
    networks:
      - asap-network

volumes:
  cargo-cache:
  cargo-git:
  api-target:
  worker-target:
  web-node-modules:
