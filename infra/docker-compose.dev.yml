# Development configuration - Full Docker environment with base images
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ============================================================================
  # Base Images - Shared by multiple services to speed up builds
  # ============================================================================
  
  base-rust:
    build:
      context: ..
      dockerfile: infra/Dockerfile.base.rust
    image: asap-base-rust:dev
    command: ["true"]
    networks:
      - asap-network
    
  base-node:
    build:
      context: ..
      dockerfile: infra/Dockerfile.base.node
    image: asap-base-node:dev
    command: ["true"]
    networks:
      - asap-network

  # ============================================================================
  # Application Services
  # ============================================================================
  
  # API in dev mode
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api.dev
    container_name: asap-api
    depends_on:
      base-rust:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ../Cargo.toml:/app/Cargo.toml
      - ../core:/app/core
      - ../apps/api:/app/apps/api
      - ../extensions:/app/extensions
      - ../.sqlx:/app/.sqlx
      - api-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      REDIS_URL: redis://redis:6379
      RUST_LOG: asap_api=debug,asap_core_api=debug,tower_http=info,sqlx=warn
      ASAP_API_PORT: 3000
      ASAP_API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_12345}
      CORS_ALLOWED_ORIGINS: http://localhost:4321,http://localhost:4322,http://localhost:4323,http://web:4321,http://sites:4322,http://accounts:4323
      # SQLX_OFFLINE: "true"  # Disabled for development to allow new queries
      GOOGLE_CLIENT_ID: "605841077442-cl54bg3dmdq6d1ednga612qhh6fj8oh5.apps.googleusercontent.com"
      GOOGLE_CLIENT_SECRET: "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"
      GOOGLE_REDIRECT_URI: "http://localhost:4323/oauth/google/callback"
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      GITHUB_REDIRECT_URI: "http://localhost:4323/oauth/github/callback"
    ports:
      - "3000:3000"
    healthcheck:
      disable: true
    networks:
      - asap-network

  # Worker in dev mode
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker.dev
    container_name: asap-worker
    depends_on:
      base-rust:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    command: ["cargo", "watch", "-x", "run --bin asap-worker", "-w", "apps/worker", "-w", "core", "-w", "extensions"]
    volumes:
      - ../core:/app/core
      - ../apps/worker:/app/apps/worker
      - ../extensions:/app/extensions
      - ../.sqlx:/app/.sqlx
      - worker-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: asap_worker=debug,sqlx=warn
      POLL_INTERVAL_SECONDS: 5
      SQLX_OFFLINE: "true"
    networks:
      - asap-network

  # Web application in dev mode
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      target: dev
    # Override the image from base docker-compose.yml to use our built image
    image: asap-web:dev
    container_name: asap-web
    # Override command from base docker-compose.yml
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: http://localhost:3000/api
      PUBLIC_WS_URL: ws://localhost:3000/ws
      NODE_ENV: development
    volumes:
      # Mount source code for hot reload
      - ../packages/shared/src:/app/packages/shared/src
      - ../packages/renderers/src:/app/packages/renderers/src
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/public:/app/apps/web/public
      - ../apps/web/astro.config.mjs:/app/apps/web/astro.config.mjs
      - ../apps/web/tailwind.config.cjs:/app/apps/web/tailwind.config.cjs
      - ../apps/web/tsconfig.json:/app/apps/web/tsconfig.json
    networks:
      - asap-network

  # Sites application in dev mode
  sites:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sites
      target: dev
    # Override the image from base docker-compose.yml to use our built image
    image: asap-sites:dev
    container_name: asap-sites
    working_dir: /app/apps/sites
    # Use sh -c to pass arguments correctly to astro
    command: ["sh", "-c", "pnpm exec astro dev --port 4322 --host 0.0.0.0"]
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "4322:4322"
    environment:
      HOST: 0.0.0.0
      PORT: 4322
      PUBLIC_API_URL: http://localhost:3000/api
      INTERNAL_API_URL: http://api:3000/api
      NODE_ENV: development
    volumes:
      # Mount source code for hot reload
      - ../packages/shared/src:/app/packages/shared/src
      - ../packages/renderers/src:/app/packages/renderers/src
      - ../apps/sites/src:/app/apps/sites/src
      - ../apps/sites/public:/app/apps/sites/public
    networks:
      - asap-network

  # Accounts application in dev mode
  accounts:
    build:
      context: ..
      dockerfile: infra/Dockerfile.accounts.dev
    # Override the image from base docker-compose.yml to use our built image
    image: asap-accounts:dev
    container_name: asap-accounts
    # Override command from base docker-compose.yml
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "4323:4323"
    environment:
      HOST: 0.0.0.0
      PORT: 4323
      PUBLIC_API_URL: http://localhost:3000/api
      PUBLIC_APP_URL: http://localhost:4321
      PUBLIC_ACCOUNTS_URL: http://localhost:4323
      NODE_ENV: development
    volumes:
      # Mount source code for hot reload
      - ../packages/shared/src:/app/packages/shared/src
      - ../apps/accounts/src:/app/apps/accounts/src
      - ../apps/accounts/public:/app/apps/accounts/public
      - ../apps/accounts/astro.config.mjs:/app/apps/accounts/astro.config.mjs
      - ../apps/accounts/tailwind.config.cjs:/app/apps/accounts/tailwind.config.cjs
      - ../apps/accounts/tsconfig.json:/app/apps/accounts/tsconfig.json
    networks:
      - asap-network

volumes:
  api-target:
  worker-target:
