# Development configuration - Full Docker environment with base images
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ============================================================================
  # Base Images - Shared by multiple services to speed up builds
  # ============================================================================
  
  base-rust:
    build:
      context: ..
      dockerfile: infra/Dockerfile.base.rust
    image: asap-base-rust:dev
    container_name: asap-base-rust
    command: /bin/true  # Do nothing, just build the image
    
  base-node:
    build:
      context: ..
      dockerfile: infra/Dockerfile.base.node
    image: asap-base-node:dev
    container_name: asap-base-node
    command: /bin/true  # Do nothing, just build the image

  # ============================================================================
  # Application Services
  # ============================================================================
  
  # API in dev mode - uses pre-built base image
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api.dev
    container_name: asap-api
    depends_on:
      base-rust:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload
      - ../Cargo.toml:/app/Cargo.toml
      - ../core:/app/core
      - ../apps/api:/app/apps/api
      - ../extensions:/app/extensions
      - ../.sqlx:/app/.sqlx
      # Cache cargo target (registry is in base image)
      - api-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      REDIS_URL: redis://redis:6379
      RUST_LOG: asap_api=debug,asap_core_api=debug,tower_http=info,sqlx=warn
      ASAP_API_PORT: 3000
      ASAP_API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_12345}
      CORS_ALLOWED_ORIGINS: http://localhost:4321,http://localhost:4322,http://localhost:4323,http://web:4321,http://sites:4322,http://accounts:4323
      # Enable SQLX offline mode to use pre-compiled query metadata
      SQLX_OFFLINE: "true"
    ports:
      - "3000:3000"
    # Disable healthcheck in dev mode (cargo-watch takes time to compile)
    healthcheck:
      disable: true
    networks:
      - asap-network

  # Worker in dev mode - uses pre-built base image
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker.dev
    container_name: asap-worker
    depends_on:
      base-rust:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    command: ["cargo", "watch", "-x", "run --bin asap-worker", "-w", "apps/worker", "-w", "core", "-w", "extensions"]
    volumes:
      # Mount source code for hot reload
      - ../core:/app/core
      - ../apps/worker:/app/apps/worker
      - ../extensions:/app/extensions
      - ../.sqlx:/app/.sqlx
      # Cache cargo target (registry is in base image)
      - worker-target:/app/target
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: asap_worker=debug,sqlx=warn
      POLL_INTERVAL_SECONDS: 5
      # Enable SQLX offline mode to use pre-compiled query metadata
      SQLX_OFFLINE: "true"
    depends_on:
      migrations:
    networks:
      - asap-network

  # Web application in dev mode - uses pre-built base image
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      target: dev
    container_name: asap-web
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: http://localhost:3000/api
      PUBLIC_WS_URL: ws://localhost:3000/ws
      NODE_ENV: development
    volume/packages:/app/packages
      - ../apps/web:/app/apps/web
    networks:
      - asap-network

  # Sites application in dev mode - uses pre-built base image
  sites:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sites
      target: dev
    container_name: asap-sites
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: sh -c "npm install -g pnpm && pnpm install --force && rm -rf node_modules/.vite && pnpm exec astro dev --host 0.0.0.0 --port 4322"
    ports:
      - "4322:4322"
    environment:
      HOST/packages:/app/packages
      - ../apps/sites:/app/apps/sites
    networks:
      - asap-network

  # Accounts application in dev mode - uses pre-built base image
  accounts:
    build:
      context: ..
      dockerfile: infra/Dockerfile.accounts.dev
    container_name: asap-accounts
    depends_on:
      base-node:
        condition: service_completed_successfully
      api:
        condition: service_started
  # Accounts application in dev mode with hot reload
  accounts:
    image: node:20-alpine
    container_name: asap-accounts
    working_dir: /app/apps/accounts
    command: sh -c "npm install -g pnpm && pnpm install --force && rm -rf node_modules/.vite && pnpm exec astro dev --host 0.0.0.0 --port 4323"
    ports:
      - "4/packages:/app/packages
      - ../apps/accounts:/app/apps/accounts
    networks:
      - asap-network

volumes:
  api-target:
  worker-target

volumes:
  cargo-cache:
  cargo-git:
  api-target:
  worker-target:
  web-node-modules:
  sites-node-modules:
  accounts-node-modules:
