version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: asap-postgres
    environment:
      POSTGRES_USER: asap
      POSTGRES_PASSWORD: asap_dev_password
      POSTGRES_DB: asap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asap"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core API
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: asap-api
    environment:
      DATABASE_URL: postgres://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: debug
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Worker
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: asap-worker
    environment:
      DATABASE_URL: postgres://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
