services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: asap-postgres
    environment:
      POSTGRES_USER: asap
      POSTGRES_PASSWORD: asap_dev_password
      POSTGRES_DB: asap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
