services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: asap-postgres
    environment:
      POSTGRES_USER: asap
      POSTGRES_PASSWORD: asap_dev_password
      POSTGRES_DB: asap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asap-network

  # Database migrations service
  # Runs automatically on startup and applies any pending migrations
  migrations:
    image: postgres:15-alpine
    container_name: asap-migrations
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      MIGRATIONS_DIR: /migrations
      PGPASSWORD: asap_dev_password
    volumes:
      - ./migrations:/migrations:ro
      - ../scripts/run-migrations.sh:/run-migrations.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash coreutils xxd && bash /run-migrations.sh"]
    restart: "no"
    networks:
      - asap-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: asap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asap-network

  # API server
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: asap-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      REDIS_URL: redis://redis:6379
      RUST_LOG: asap_api=info,asap_core_api=info,tower_http=info,sqlx=warn
      ASAP_API_PORT: 3000
      ASAP_API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_12345}
      CORS_ALLOWED_ORIGINS: http://localhost:4321,http://localhost:4322,http://localhost:4323,http://web:4321,http://sites:4322,http://accounts:4323
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - asap-network

  # Worker service
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: asap-worker
    # For development: mount local binary (comment out for production)
    volumes:
      - ../target/debug/asap-worker:/app/asap-worker:ro
    command: /app/asap-worker
    environment:
      DATABASE_URL: postgresql://asap:asap_dev_password@postgres:5432/asap
      RUST_LOG: asap_worker=debug,sqlx=warn
      POLL_INTERVAL_SECONDS: 5
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - asap-network

  # Web application (Astro) - Dev mode with hot reload
  web:
    image: node:20-alpine
    container_name: asap-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: development
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - asap-network

  # Sites application (Astro) - Public sites server
  # Note: In dev mode, this is overridden by docker-compose.dev.yml to use the custom Dockerfile
  sites:
    image: node:20-alpine
    container_name: asap-sites
    # Default command for standalone use - overridden in docker-compose.dev.yml
    command: sh -c "cd /app/apps/sites && corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev -- --host 0.0.0.0"
    ports:
      - "4322:4322"
    environment:
      HOST: 0.0.0.0
      PORT: 4322
      PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: development
    volumes:
      - ../:/app
    depends_on:
      api:
        condition: service_healthy
    networks:
      - asap-network

networks:
  asap-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
